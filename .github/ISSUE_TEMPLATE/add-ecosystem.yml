name: Add Open Source Ecosystem
description: Create a new markdown ecosystem entry under content/ecosystems
title: "[content/ecosystem] "
labels:
  - content
  - content:ecosystem
body:
  - type: input
    id: slug
    attributes:
      label: Slug
      placeholder: community-sdks
    validations:
      required: false

  - type: input
    id: name
    attributes:
      label: Name
      placeholder: community-sdks
    validations:
      required: true

  - type: input
    id: focus
    attributes:
      label: Focus
      placeholder: multi-language SDK ecosystem
    validations:
      required: true

  - type: dropdown
    id: status
    attributes:
      label: Status
      options:
        - Active
        - Growing
        - In Development
    validations:
      required: true

  - type: input
    id: order
    attributes:
      label: Order
      placeholder: "3"
    validations:
      required: false

  - type: input
    id: link
    attributes:
      label: Link
      placeholder: https://github.com/sasaorasanin
    validations:
      required: true

  - type: input
    id: scale
    attributes:
      label: Scale
      placeholder: 25+ packages
    validations:
      required: false

  - type: dropdown
    id: display_on
    attributes:
      label: Display On Versions
      multiple: true
      options:
        - full
        - dot-net
        - php
        - laravel
    validations:
      required: false

  - type: dropdown
    id: collapsed_on
    attributes:
      label: Collapsed On
      multiple: true
      options:
        - all
        - full
        - dot-net
        - php
        - laravel
    validations:
      required: false

  - type: input
    id: stars
    attributes:
      label: Stars
      placeholder: "500"
    validations:
      required: false

  - type: textarea
    id: priority
    attributes:
      label: Priority per version
      placeholder: |
        dot-net=1
        php=2
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      render: markdown
    validations:
      required: true
