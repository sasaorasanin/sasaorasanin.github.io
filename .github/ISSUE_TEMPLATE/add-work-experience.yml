name: Add Work Experience
description: Create a new markdown work experience entry under content/work-experiences
title: "[content/work] "
labels:
  - content
  - content:work-experience
body:
  - type: input
    id: slug
    attributes:
      label: Slug
      description: Optional file slug. If empty, slug is generated from company.
      placeholder: fundpoint
    validations:
      required: false

  - type: input
    id: company
    attributes:
      label: Company
      placeholder: FundPoint
    validations:
      required: true

  - type: input
    id: position
    attributes:
      label: Position
      placeholder: Software Engineer (Contract)
    validations:
      required: true

  - type: dropdown
    id: engagement_type
    attributes:
      label: Engagement Type
      options:
        - Full-time
        - Part-time
        - Contract
        - Freelance
        - Hourly
        - Internship
    validations:
      required: true

  - type: input
    id: start
    attributes:
      label: Start (YYYY-MM)
      placeholder: 2022-08
    validations:
      required: true

  - type: input
    id: end
    attributes:
      label: End (YYYY-MM or Present)
      placeholder: Present
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: Location
      placeholder: Remote
    validations:
      required: true

  - type: input
    id: order
    attributes:
      label: Order
      placeholder: "3"
    validations:
      required: false

  - type: dropdown
    id: display_on
    attributes:
      label: Display On Versions
      description: Multi-select version tags where this entry should appear.
      multiple: true
      options:
        - full
        - dot-net
        - php
        - laravel
    validations:
      required: false

  - type: dropdown
    id: collapsed_on
    attributes:
      label: Collapsed On
      description: Multi-select tags where card should start collapsed in mixed mode.
      multiple: true
      options:
        - all
        - full
        - dot-net
        - php
        - laravel
    validations:
      required: false

  - type: input
    id: stars
    attributes:
      label: Stars
      description: Optional numeric badge.
      placeholder: "120"
    validations:
      required: false

  - type: textarea
    id: priority
    attributes:
      label: Priority per version
      description: Optional lines formatted as version=value (for example dot-net=1).
      placeholder: |
        dot-net=1
        php=2
    validations:
      required: false

  - type: textarea
    id: technologies
    attributes:
      label: Technologies
      description: One item per line.
      placeholder: |
        C#
        ASP.NET
        React
        Azure
    validations:
      required: false

  - type: textarea
    id: summary
    attributes:
      label: Summary
      render: markdown
      placeholder: Short role summary paragraph.
    validations:
      required: true

  - type: textarea
    id: responsibilities
    attributes:
      label: Responsibilities
      render: markdown
      description: One bullet per line, or plain lines.
    validations:
      required: false

  - type: textarea
    id: highlights
    attributes:
      label: Highlights
      render: markdown
      description: One bullet per line, or plain lines.
    validations:
      required: false

  - type: textarea
    id: notes
    attributes:
      label: Notes
      render: markdown
      description: Optional extra notes/TODO lines.
    validations:
      required: false
