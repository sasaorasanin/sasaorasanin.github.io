name: Issue Form to Content

on:
  issues:
    types: [opened, edited]

permissions:
  contents: write
  issues: write

jobs:
  create-content-file:
    if: contains(join(github.event.issue.labels.*.name, ','), 'content')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate content file from issue form
        id: generate
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_LABELS: ${{ join(github.event.issue.labels.*.name, ',') }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: node scripts/issue-form-to-content.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit generated file
        if: steps.changes.outputs.has_changes == 'true'
        env:
          CREATED_FILE: ${{ steps.generate.outputs.created_file }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "$CREATED_FILE"
          git commit -m "chore(content): add $CREATED_FILE from issue #${{ github.event.issue.number }}"
          git push

      - name: Comment with result
        if: steps.changes.outputs.has_changes == 'true'
        uses: actions/github-script@v7
        env:
          CREATED_FILE: ${{ steps.generate.outputs.created_file }}
        with:
          script: |
            const created = process.env.CREATED_FILE;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `Created new content file: \`${created}\``
            });
